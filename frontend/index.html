<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TODO List Distribuído</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      color: #1a1a2e;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
    }
    header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: .5px; }
    header span { font-size: .85rem; opacity: .7; }

    .container { max-width: 860px; margin: 2rem auto; padding: 0 1rem; }

    /* ─── Seleção de usuário ─── */
    .user-section {
      background: #fff;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    .user-section h2 { font-size: 1rem; margin-bottom: 1rem; color: #444; }
    .user-row { display: flex; gap: .75rem; align-items: center; flex-wrap: wrap; }
    select, input[type="text"], input[type="email"], input[type="password"] {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: .55rem .85rem;
      font-size: .9rem;
      outline: none;
      transition: border .2s;
    }
    select:focus, input:focus { border-color: #4f46e5; }
    select { flex: 1; min-width: 180px; }

    /* ─── Botões ─── */
    .btn {
      padding: .55rem 1.1rem;
      border: none;
      border-radius: 8px;
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn:hover { opacity: .88; }
    .btn-primary   { background: #4f46e5; color: #fff; }
    .btn-success   { background: #10b981; color: #fff; }
    .btn-danger    { background: #ef4444; color: #fff; }
    .btn-secondary { background: #6b7280; color: #fff; }
    .btn-sm { padding: .35rem .75rem; font-size: .8rem; }

    /* ─── Estatísticas ─── */
    .stats-bar {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .stat-card {
      flex: 1;
      min-width: 140px;
      background: #fff;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      text-align: center;
    }
    .stat-card .stat-value {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: .25rem;
    }
    .stat-card .stat-label { font-size: .8rem; color: #888; text-transform: uppercase; letter-spacing: .5px; }
    .stat-total    .stat-value { color: #4f46e5; }
    .stat-done     .stat-value { color: #10b981; }
    .stat-pending  .stat-value { color: #f59e0b; }

    /* ─── Formulário nova tarefa ─── */
    .add-task-form {
      background: #fff;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    .add-task-form h2 { font-size: 1rem; margin-bottom: 1rem; color: #444; }
    .form-row { display: flex; gap: .75rem; }
    .form-row input { flex: 1; }

    /* ─── Lista de tarefas ─── */
    .tasks-section {
      background: #fff;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    .tasks-section h2 { font-size: 1rem; margin-bottom: 1rem; color: #444; }

    .task-item {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .75rem;
      border-radius: 8px;
      border: 1px solid #f0f0f0;
      margin-bottom: .5rem;
      transition: background .15s;
    }
    .task-item:hover { background: #fafafa; }
    .task-item.done { opacity: .6; }
    .task-item.done .task-title { text-decoration: line-through; }
    .task-title { flex: 1; font-size: .92rem; }
    .task-status {
      font-size: .75rem;
      padding: .2rem .6rem;
      border-radius: 20px;
      font-weight: 600;
    }
    .status-pending  { background: #fef3c7; color: #92400e; }
    .status-done     { background: #d1fae5; color: #065f46; }

    /* ─── Modal novo usuário ─── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(0,0,0,.2);
    }
    .modal h2 { margin-bottom: 1.25rem; font-size: 1.1rem; }
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: .4rem; color: #555; }
    .field input { width: 100%; }
    .modal-actions { display: flex; gap: .75rem; justify-content: flex-end; margin-top: 1.25rem; }

    /* ─── Mensagens ─── */
    .toast {
      position: fixed;
      bottom: 1.5rem; right: 1.5rem;
      padding: .75rem 1.25rem;
      border-radius: 8px;
      font-size: .88rem;
      font-weight: 600;
      color: #fff;
      box-shadow: 0 4px 12px rgba(0,0,0,.15);
      opacity: 0;
      transform: translateY(10px);
      transition: all .3s;
      z-index: 200;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.ok  { background: #10b981; }
    .toast.err { background: #ef4444; }

    .empty { text-align: center; color: #aaa; padding: 2rem; font-size: .9rem; }
    .loading { text-align: center; color: #888; padding: 1rem; }
  </style>
</head>
<body>

<header>
  <h1>📝 TODO List Distribuído</h1>
  <span id="user-label">Nenhum usuário selecionado</span>
</header>

<div class="container">

  <!-- Seleção de usuário -->
  <div class="user-section">
    <h2>👤 Usuário ativo</h2>
    <div class="user-row">
      <select id="user-select">
        <option value="">Carregando usuários...</option>
      </select>
      <button class="btn btn-primary" onclick="trocarUsuario()">Selecionar</button>
      <button class="btn btn-secondary" onclick="abrirModalUsuario()">+ Novo usuário</button>
    </div>
  </div>

  <!-- Estatísticas (Serviço 3) -->
  <div class="stats-bar" id="stats-bar" style="display:none">
    <div class="stat-card stat-total">
      <div class="stat-value" id="stat-total">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat-card stat-done">
      <div class="stat-value" id="stat-done">0</div>
      <div class="stat-label">Concluídas</div>
    </div>
    <div class="stat-card stat-pending">
      <div class="stat-value" id="stat-pending">0</div>
      <div class="stat-label">Pendentes</div>
    </div>
  </div>

  <!-- Nova tarefa -->
  <div class="add-task-form" id="add-form" style="display:none">
    <h2>➕ Nova tarefa</h2>
    <div class="form-row">
      <input type="text" id="titulo-input" placeholder="Digite o título da tarefa..." maxlength="255" />
      <button class="btn btn-success" onclick="criarTarefa()">Adicionar</button>
    </div>
  </div>

  <!-- Lista de tarefas -->
  <div class="tasks-section" id="tasks-section" style="display:none">
    <h2>📋 Minhas tarefas</h2>
    <div id="task-list"><div class="loading">Selecione um usuário para ver as tarefas.</div></div>
  </div>

</div>

<!-- Modal novo usuário -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2>Criar novo usuário</h2>
    <div class="field">
      <label>Nome</label>
      <input type="text" id="new-nome" placeholder="Seu nome" />
    </div>
    <div class="field">
      <label>E-mail</label>
      <input type="email" id="new-email" placeholder="email@exemplo.com" />
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="new-senha" placeholder="Senha" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="criarUsuario()">Criar</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ─── Configuração das URLs dos serviços ──────────────────────────────────
  const SERVICE1 = 'http://localhost:3001';  // Node.js + Prisma
  const SERVICE3 = 'http://localhost:8000';  // FastAPI + SQLAlchemy

  let usuarioAtivo = null;

  // ─── Toast ───────────────────────────────────────────────────────────────
  function toast(msg, tipo = 'ok') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast show ${tipo}`;
    setTimeout(() => { el.className = 'toast'; }, 3000);
  }

  // ─── Inicialização ────────────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', carregarUsuarios);

  async function carregarUsuarios() {
    try {
      const res = await fetch(`${SERVICE1}/api/usuarios`);
      const usuarios = await res.json();
      const sel = document.getElementById('user-select');
      sel.innerHTML = '<option value="">Selecione um usuário...</option>';
      usuarios.forEach(u => {
        const opt = document.createElement('option');
        opt.value = u.id;
        opt.textContent = `${u.nome} (${u.email})`;
        sel.appendChild(opt);
      });
    } catch {
      document.getElementById('user-select').innerHTML =
        '<option value="">Erro ao carregar usuários</option>';
      toast('Não foi possível conectar ao Serviço 1', 'err');
    }
  }

  // ─── Troca de usuário ────────────────────────────────────────────────────
  function trocarUsuario() {
    const sel = document.getElementById('user-select');
    const id  = parseInt(sel.value);
    if (!id) { toast('Selecione um usuário', 'err'); return; }

    usuarioAtivo = { id, label: sel.options[sel.selectedIndex].text };
    document.getElementById('user-label').textContent = usuarioAtivo.label;

    document.getElementById('stats-bar').style.display = 'flex';
    document.getElementById('add-form').style.display   = 'block';
    document.getElementById('tasks-section').style.display = 'block';

    carregarTarefas();
    carregarEstatisticas();
  }

  // ─── Estatísticas (Serviço 3) ─────────────────────────────────────────────
  async function carregarEstatisticas() {
    if (!usuarioAtivo) return;
    try {
      const res  = await fetch(`${SERVICE3}/analytics/${usuarioAtivo.id}`);
      const data = await res.json();
      document.getElementById('stat-total').textContent   = data.total;
      document.getElementById('stat-done').textContent    = data.concluidas;
      document.getElementById('stat-pending').textContent = data.pendentes;
    } catch {
      // Stats falhou silenciosamente — não trava o fluxo principal
      console.warn('Serviço 3 indisponível');
    }
  }

  // ─── Listar tarefas (Serviço 1) ──────────────────────────────────────────
  async function carregarTarefas() {
    if (!usuarioAtivo) return;
    const list = document.getElementById('task-list');
    list.innerHTML = '<div class="loading">Carregando...</div>';
    try {
      const res    = await fetch(`${SERVICE1}/api/tarefas/usuario/${usuarioAtivo.id}`);
      const tarefas = await res.json();
      renderTarefas(tarefas);
    } catch {
      list.innerHTML = '<div class="empty">Erro ao carregar tarefas.</div>';
      toast('Erro ao conectar ao Serviço 1', 'err');
    }
  }

  function renderTarefas(tarefas) {
    const list = document.getElementById('task-list');
    if (!tarefas.length) {
      list.innerHTML = '<div class="empty">Nenhuma tarefa cadastrada ainda.</div>';
      return;
    }
    list.innerHTML = tarefas.map(t => `
      <div class="task-item ${t.concluida ? 'done' : ''}" id="task-${t.id}">
        <span class="task-title">${escapeHtml(t.titulo)}</span>
        <span class="task-status ${t.concluida ? 'status-done' : 'status-pending'}">
          ${t.concluida ? '✓ Concluída' : '⏳ Pendente'}
        </span>
        ${!t.concluida ? `
          <button class="btn btn-success btn-sm" onclick="concluirTarefa(${t.id})">Concluir</button>
        ` : ''}
        <button class="btn btn-danger btn-sm" onclick="deletarTarefa(${t.id})">Excluir</button>
      </div>
    `).join('');
  }

  // ─── Criar tarefa (Serviço 1) ────────────────────────────────────────────
  async function criarTarefa() {
    if (!usuarioAtivo) { toast('Selecione um usuário primeiro', 'err'); return; }
    const input  = document.getElementById('titulo-input');
    const titulo = input.value.trim();
    if (!titulo) { toast('Digite um título para a tarefa', 'err'); return; }

    try {
      const res = await fetch(`${SERVICE1}/api/tarefas`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ titulo, usuarioId: usuarioAtivo.id }),
      });

      if (!res.ok) {
        const err = await res.json();
        toast(err.erro || 'Erro ao criar tarefa', 'err');
        return;
      }

      input.value = '';
      toast('Tarefa criada com sucesso!');
      carregarTarefas();
      carregarEstatisticas();
    } catch {
      toast('Erro ao conectar ao Serviço 1', 'err');
    }
  }

  // Enter para criar tarefa
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.activeElement.id === 'titulo-input') criarTarefa();
  });

  // ─── Concluir tarefa (Serviço 1) ─────────────────────────────────────────
  async function concluirTarefa(id) {
    try {
      const res = await fetch(`${SERVICE1}/api/tarefas/${id}/concluir`, { method: 'PATCH' });
      if (!res.ok) { toast('Erro ao concluir tarefa', 'err'); return; }
      toast('Tarefa concluída!');
      carregarTarefas();
      carregarEstatisticas();
    } catch {
      toast('Erro ao conectar ao Serviço 1', 'err');
    }
  }

  // ─── Deletar tarefa (Serviço 1) ──────────────────────────────────────────
  async function deletarTarefa(id) {
    if (!confirm('Deseja excluir esta tarefa?')) return;
    try {
      const res = await fetch(`${SERVICE1}/api/tarefas/${id}`, { method: 'DELETE' });
      if (!res.ok) { toast('Erro ao excluir tarefa', 'err'); return; }
      toast('Tarefa excluída!');
      carregarTarefas();
      carregarEstatisticas();
    } catch {
      toast('Erro ao conectar ao Serviço 1', 'err');
    }
  }

  // ─── Criar usuário (modal) ────────────────────────────────────────────────
  function abrirModalUsuario() { document.getElementById('modal-overlay').classList.add('open'); }
  function fecharModal()       { document.getElementById('modal-overlay').classList.remove('open'); }

  async function criarUsuario() {
    const nome  = document.getElementById('new-nome').value.trim();
    const email = document.getElementById('new-email').value.trim();
    const senha = document.getElementById('new-senha').value;

    if (!nome || !email || !senha) { toast('Preencha todos os campos', 'err'); return; }

    try {
      const res = await fetch(`${SERVICE1}/api/usuarios`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nome, email, senha }),
      });

      if (!res.ok) {
        const err = await res.json();
        toast(err.erro || 'Erro ao criar usuário', 'err');
        return;
      }

      fecharModal();
      document.getElementById('new-nome').value  = '';
      document.getElementById('new-email').value = '';
      document.getElementById('new-senha').value = '';
      toast('Usuário criado com sucesso!');
      await carregarUsuarios();
    } catch {
      toast('Erro ao conectar ao Serviço 1', 'err');
    }
  }

  // ─── Utilitários ─────────────────────────────────────────────────────────
  function escapeHtml(str) {
    return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }
</script>
</body>
</html>
